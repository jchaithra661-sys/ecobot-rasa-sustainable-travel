# EcoBot – Rules (deterministic, always override stories)

version: "3.1"

rules:

  # Greeting always triggers welcome message
  - rule: Say hello on greet
    steps:
      - intent: greet
      - action: utter_greet

  # Goodbye always ends conversation
  - rule: Say goodbye
    steps:
      - intent: goodbye
      - action: utter_goodbye

  # Out-of-scope always triggers clarification
  - rule: Handle out-of-scope
    steps:
      - intent: out_of_scope
      - action: utter_out_of_scope

  # User explicitly requests escalation → hand over immediately
  - rule: Escalate on user request
    steps:
      - intent: request_escalation
      - action: action_handover_to_human

  # First fallback: show clarification options
  - rule: First fallback - clarify
    steps:
      - action: action_default_fallback
      - action: utter_clarify_stage1

  # Second fallback in a row → escalate to human
  - rule: Second fallback - escalate
    condition:
      - slot_was_set:
          - fallback_count: 1
    steps:
      - action: action_default_fallback
      - action: action_handover_to_human
