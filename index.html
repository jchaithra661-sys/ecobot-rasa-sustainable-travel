<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoBot – Sustainable Travel Advisor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f7f4; height: 100vh; display: flex; flex-direction: column; }
    header { background: #1a5c3a; color: white; padding: 16px 24px; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 1.4rem; }
    header span { font-size: 0.85rem; opacity: 0.85; }
    #chat-container { flex: 1; display: flex; flex-direction: column; max-width: 800px; margin: 20px auto; width: 100%; background: white; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); overflow: hidden; }
    #messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; min-height: 400px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 0.95rem; line-height: 1.4; }
    .bot { background: #e8f5e9; color: #1a5c3a; align-self: flex-start; }
    .user { background: #1a5c3a; color: white; align-self: flex-end; }
    .typing { color: #999; font-style: italic; font-size: 0.85rem; }
    #input-area { display: flex; padding: 16px; border-top: 1px solid #eee; gap: 10px; }
    #user-input { flex: 1; padding: 10px 16px; border: 2px solid #1a5c3a; border-radius: 25px; font-size: 0.95rem; outline: none; }
    #send-btn { background: #1a5c3a; color: white; border: none; padding: 10px 20px; border-radius: 25px; cursor: pointer; font-size: 0.95rem; font-weight: bold; }
    #send-btn:hover { background: #2d8a57; }
  </style>
</head>
<body>
<header>
  <div><h1>🌿 EcoBot</h1><span>Sustainable Travel Advisor — powered by Rasa</span></div>
</header>
<div id="chat-container">
  <div id="messages">
    <div class="msg bot">👋 Hello! I'm EcoBot, your sustainable travel advisor. Ask me about eco-friendly destinations, carbon footprint, or green hotels!</div>
  </div>
  <div id="input-area">
    <input id="user-input" type="text" placeholder="Type a message and press Enter..." autofocus />
    <button id="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>
<script>
const RASA_URL = "http://localhost:5005";
const messages = document.getElementById("messages");
const input = document.getElementById("user-input");
input.addEventListener("keydown", e => { if (e.key === "Enter") sendMessage(); });
function addMsg(text, type) {
  const div = document.createElement("div");
  div.className = "msg " + type;
  div.textContent = text;
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}
async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;
  addMsg(text, "user");
  input.value = "";
  const typing = document.createElement("div");
  typing.className = "typing";
  typing.textContent = "EcoBot is typing...";
  messages.appendChild(typing);
  try {
    const res = await fetch(`${RASA_URL}/webhooks/rest/webhook`, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ sender: "user1", message: text })
    });
    const data = await res.json();
    typing.remove();
    if (data.length === 0) { addMsg("I'm not sure how to respond to that. Could you rephrase?", "bot"); }
    else { data.forEach(msg => { if (msg.text) addMsg(msg.text, "bot"); }); }
  } catch (err) {
    typing.remove();
    addMsg("Connecting to EcoBot...", "bot");
  }
}
</script>
</body>
</html>
