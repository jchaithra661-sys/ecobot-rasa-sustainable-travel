<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EcoBot – Sustainable Travel Advisor</title>
  <script src="https://cdn.jsdelivr.net/npm/rasa-webchat@1.0.1/lib/index.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f0f7f4; }

    header {
      background: #1a5c3a;
      color: white;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    header h1 { font-size: 1.4rem; }
    header span { font-size: 0.85rem; opacity: 0.85; }

    /* ── Colour-coded result cards ────────────────────────────── */
    .card { border-radius: 8px; padding: 12px 16px; margin: 8px 0; font-size: 0.9rem; }
    .card.green  { background: #d4edda; border-left: 5px solid #28a745; }
    .card.amber  { background: #fff3cd; border-left: 5px solid #ffc107; }
    .card.red    { background: #f8d7da; border-left: 5px solid #dc3545; }
    .card .badge {
      display: inline-block; font-size: 0.7rem; font-weight: bold;
      padding: 2px 6px; border-radius: 4px; background: #1a5c3a;
      color: white; margin-left: 6px;
    }

    /* ── Carousel ─────────────────────────────────────────────── */
    .carousel-wrap { overflow-x: auto; display: flex; gap: 12px; padding: 8px 0; }
    .carousel-item {
      min-width: 180px; border-radius: 8px; padding: 12px;
      background: white; box-shadow: 0 2px 6px rgba(0,0,0,.1);
      border-top: 5px solid #ccc;
      font-size: 0.85rem;
    }
    .carousel-item.green { border-top-color: #28a745; }
    .carousel-item.amber { border-top-color: #ffc107; }
    .carousel-item.red   { border-top-color: #dc3545; }
    .carousel-item h4 { font-size: 0.9rem; margin-bottom: 4px; }

    /* ── Handover banner ──────────────────────────────────────── */
    #handover-banner {
      display: none; position: fixed; top: 0; left: 0; right: 0;
      background: #1a5c3a; color: white; text-align: center;
      padding: 12px; font-size: 1rem; z-index: 9999;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }

    /* ── Alert message ────────────────────────────────────────── */
    .alert-msg {
      background: #fff3cd; border: 1px solid #ffc107;
      border-radius: 6px; padding: 8px 12px; font-size: 0.85rem;
      margin: 6px 0; color: #856404;
    }
  </style>
</head>
<body>

<div id="handover-banner">
  🔄 Connecting you to a sustainable travel specialist...
</div>

<header>
  <div>
    <h1>🌿 EcoBot</h1>
    <span>Sustainable Travel Advisor — powered by Rasa</span>
  </div>
</header>

<div id="webchat"></div>

<script>
  WebChat.default.init({
    selector: "#webchat",
    initPayload: "/greet",
    socketUrl: "http://localhost:5005",
    socketPath: "/socket.io/",
    title: "EcoBot",
    subtitle: "Eco-friendly travel planning",
    inputTextFieldHint: "Type a destination, question, or press a button...",
    showFullScreenButton: true,
    displayUnreadCount: true,
    params: { storage: "session" },

    // ── Custom message renderer (carousels, colour cards, handover) ──
    customMessageDelay: (message) => 800,

    onSocketEvent: {
      bot_uttered: (e) => {
        if (!e.data || !e.data.json_message) return;
        const msg = e.data.json_message;

        // Handover indicator
        if (msg.type === "handover_indicator" && msg.active) {
          document.getElementById("handover-banner").style.display = "block";
        }

        // Carousel rendering (injected into page below webchat)
        if (msg.type === "carousel" && msg.items) {
          const wrap = document.createElement("div");
          wrap.className = "carousel-wrap";
          msg.items.forEach(item => {
            const card = document.createElement("div");
            card.className = `carousel-item ${item.colour || "amber"}`;
            card.innerHTML = `
              <h4>${item.title}${item.gstc ? '<span class="badge">GSTC ✓</span>' : ""}</h4>
              <p>${item.subtitle}</p>
              <p style="margin-top:6px;font-weight:bold">Score: ${item.score}</p>
            `;
            wrap.appendChild(card);
          });
          const container = document.createElement("div");
          container.style.padding = "0 12px";
          container.appendChild(wrap);
          document.getElementById("webchat").appendChild(container);
        }
      }
    }
  });
</script>
</body>
</html>
