# EcoBot – Rasa NLU + Core Configuration
# Primary pipeline: DIETClassifier (CPU-friendly, fast)
# Optional: swap to DistilBERT (see commented block below) if GPU available

language: en

pipeline:
  - name: SpacyNLP
    model: en_core_web_sm
  - name: SpacyTokenizer
  - name: SpacyFeaturizer
  - name: RegexFeaturizer
  - name: LexicalSyntacticFeaturizer
  - name: CountVectorsFeaturizer
    analyzer: char_wb
    min_ngram: 1
    max_ngram: 4
  - name: CountVectorsFeaturizer
  - name: DIETClassifier
    epochs: 100
    constrain_similarities: true
    entity_recognition: true
  - name: EntitySynonymMapper
  - name: ResponseSelector
    epochs: 100
    constrain_similarities: true
  - name: FallbackClassifier
    threshold: 0.65
    ambiguity_threshold: 0.10

# ── Optional DistilBERT pipeline (uncomment & comment above to use) ──────────
# pipeline:
#   - name: HFTransformersNLP
#     model_name: distilbert
#     model_weights: distilbert-base-uncased
#   - name: LanguageModelTokenizer
#   - name: LanguageModelFeaturizer
#   - name: DIETClassifier
#     epochs: 50
#   - name: FallbackClassifier
#     threshold: 0.65

policies:
  - name: MemoizationPolicy
  - name: TEDPolicy
    max_history: 5
    epochs: 100
  - name: RulePolicy
    core_fallback_threshold: 0.65
    core_fallback_action_name: action_default_fallback
